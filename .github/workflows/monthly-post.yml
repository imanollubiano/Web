name: Publicación mensual automática

on:
  schedule:
    - cron: '0 9 1 * *'   # día 1 de cada mes a las 09:00 UTC
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Instalar SDK de Anthropic
        run: npm install @anthropic-ai/sdk --no-save

      - name: Generar artículo
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit y push del artículo generado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear (el artículo de este mes ya existía)."
          else
            git commit -m "chore: artículo automático $(date +'%B %Y')"
            git push origin main
          fi

      - name: Notificar Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARTICLE_TITLE: ${{ steps.generate.outputs.article_title }}
          ARTICLE_DATE: ${{ steps.generate.outputs.article_date }}
          ARTICLE_SLUG: ${{ steps.generate.outputs.article_slug }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=5763719
            EMBED_TITLE="📝 Nuevo artículo publicado"
          else
            COLOR=15548997
            EMBED_TITLE="❌ Error al generar artículo"
          fi

          ARTICLE_URL="https://imanol.info/blog/${ARTICLE_SLUG:-}"
          DISPLAY_TITLE="${ARTICLE_TITLE:-No disponible}"
          DISPLAY_DATE="${ARTICLE_DATE:-No disponible}"

          PAYLOAD=$(jq -n \
            --arg embed_title "$EMBED_TITLE" \
            --argjson color "$COLOR" \
            --arg article_title "$DISPLAY_TITLE" \
            --arg article_date "$DISPLAY_DATE" \
            --arg article_url "$ARTICLE_URL" \
            '{
              embeds: [{
                title: $embed_title,
                color: $color,
                fields: [
                  {name: "Artículo", value: $article_title, inline: false},
                  {name: "Fecha",    value: $article_date,  inline: true},
                  {name: "Enlace",   value: $article_url,   inline: true}
                ],
                footer: {text: "Portfolio de Imanol Lubiano"}
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
